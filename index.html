<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>RCQ 2 Mayo 2026 — Standing</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>

    <style></style>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="data:," />
  </head>

  <body>
    <div id="app">
      <!-- Router view principal -->
      <router-view></router-view>
    </div>

    <footer>Mario Canto. 2026. PandaComboMtg</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import {
        ARCHETYPE_CARD_MAP,
        getScryfallImage,
      } from "./JS/archetypeMap.js";
      const { createApp, ref, computed, onMounted } = Vue;
      const { createRouter, createWebHashHistory, routerView, RouterLink } =
        VueRouter;

      // ── Store compartido (simple reactive state) ────────────────────────
      const store = Vue.reactive({
        allPlayers: [],
        loaded: false,
      });

      // ── Cache global de imágenes Scryfall ───────────────────────────────
      const archetypeImages = Vue.ref({});

      async function loadData() {
        if (store.loaded) return;
        const res = await fetch("./Data/MAIN_RCQ_SC_JSON.json");
        store.allPlayers = await res.json();
        store.loaded = true;
      }

      // Función para normalizar nombres de tienda (ej: 'Casa de Juegos' -> 'casa-de-juegos')
      function normalizeStoreId(storeName) {
        if (!storeName) return "";
        return storeName.toLowerCase().replace(/[\s_]+/g, "-");
      }

      // Función para formatear la fecha de ISO a amigable
      function formatDateFriendly(dateString) {
        if (!dateString) return "";
        const options = { year: "numeric", month: "long", day: "numeric" };
        const date = new Date(dateString);
        return date.toLocaleDateString("es-ES", {
          ...options,
          timeZone: "UTC",
        });
      }

      // Scope global — junto a formatDateFriendly y normalizeStoreId
      function stripPrefix(name) {
        if (!name || name.length <= 4) return name;
        return name.slice(4);
      }

      function displayName(name) {
        if (!name || !ARCHETYPE_CARD_MAP[name]) return "Otros";
        return stripPrefix(name);
      }

      // ── Vista Standing ──────────────────────────────────────────────────
      const Standing = {
        template: `
    <div>
      <table class="table table-sm table-bordered table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Pts</th>
            <th>%VPO</th>
            <th>%JG</th>
            <th>%JGO</th>
            <th>V</th>
            <th>D</th>
            <th>E</th>
            <th>Arquetipo</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="player in filteredPlayers" :key="player.Puesto + player.Nombre">
            <td>{{ player.Puesto }}</td>
            <td>{{ player.Nombre }}  <span
              v-if="player.Badge || inferBadge(player.Puesto)"
              class="badge me-1"
              :class="badgeClass(player.Badge || inferBadge(player.Puesto))"
            >{{ player.Badge || inferBadge(player.Puesto) }}</span>
            </td>
            <td>{{ player.Puntos }}</td>
            <td>{{ player['%VPO'] }}</td>
            <td>{{ player['%JG'] }}</td>
            <td>{{ player['%JGO'] }}</td>
            <td>{{ player.V }}</td>
            <td>{{ player.D }}</td>
            <td>{{ player.E }}</td>
            <td>
            <a v-if="player['URL Decklist']" :href="player['URL Decklist']" target="_blank" rel="noopener noreferrer">
            {{ stripPrefix(player.Arquetipo) }}
            </a>
            <span v-else>{{ stripPrefix(player.Arquetipo) }}</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  `,

        setup() {
          const filteredPlayers = Vue.inject("filteredPlayers", ref([]));
          function stripPrefix(name) {
            if (!name || name.length <= 4) return name;
            return name.slice(4);
          }
          function inferBadge(puesto) {
            if (puesto === 1) return "1st";
            if (puesto === 2) return "2nd";
            if (puesto <= 4) return "T4";
            if (puesto <= 8) return "T8";
            return null;
          }

          function badgeClass(badge) {
            const map = {
              "1st": "badge-gold",
              "2nd": "badge-silver",
              T4: "badge-bronze",
              T8: "badge-green",
            };
            return map[badge] || "";
          }

          return { filteredPlayers, stripPrefix, inferBadge, badgeClass };
        },
      };

      // ── Vista Metagame ──────────────────────────────────────────────────
      const Metagame = {
        setup() {
          const filteredPlayers = Vue.inject("filteredPlayers", Vue.ref([]));

          function bestBadge(badges) {
            const order = ["1st", "2nd", "T4", "T8"];
            for (const b of order) {
              if (badges.includes(b)) return b;
            }
            return null;
          }

          const archetypeStats = Vue.computed(() => {
            const players = filteredPlayers.value;
            if (!players.length) return [];

            const total = players.length;
            const map = {};

            players.forEach((p) => {
              const key = p.Arquetipo;
              if (!map[key]) {
                map[key] = {
                  nombre: key,

                  decklistUrl: p["URL Decklist"] || "",
                  copies: 0,
                  wins: 0,
                  losses: 0,
                  draws: 0,
                  totalGames: 0,
                  badges: [],
                };
              }

              const entry = map[key];
              entry.copies++;

              const v = parseInt(p.V) || 0;
              const d = parseInt(p.D) || 0;
              const e = parseInt(p.E) || 0;
              entry.wins += v;
              entry.losses += d;
              entry.draws += e;
              entry.totalGames += v + d + e;

              // Badge: usa campo Badge del JSON si existe, si no, inferir por Puesto
              const badge = p.Badge || inferBadge(p.Puesto);
              if (badge) entry.badges.push(badge);
            });

            return Object.values(map)
              .map((entry) => ({
                ...entry,
                metaPct: ((entry.copies / total) * 100).toFixed(2) + "%",
                winRate:
                  entry.totalGames > 0
                    ? ((entry.wins / entry.totalGames) * 100).toFixed(1) + "%"
                    : "N/A",
              }))
              .sort((a, b) => b.copies - a.copies);
          });

          const tournamentMeta = Vue.computed(() => {
            const players = filteredPlayers.value;
            if (!players.length) return null;
            const p = players[0];
            return {
              store: p.STORE || "",
              formato: p.FORMATO || "",
              idLabel: p.IDLABEL || "",
              fecha: p.Fecha ? formatDateFriendly(p.Fecha) : "",
            };
          });

          Vue.watch(
            archetypeStats,
            async (stats) => {
              if (!stats?.length) return;
              const BATCH = 3;
              for (let i = 0; i < stats.length; i += BATCH) {
                const batch = stats.slice(i, i + BATCH);
                await Promise.all(
                  batch.map(async (arch) => {
                    if (archetypeImages.value[arch.nombre]) return; // Ya tenemos la imagen, saltar

                    const entry = ARCHETYPE_CARD_MAP[arch.nombre];
                    if (!entry) {
                      // Fallback: Fblthp, Lost on the Range
                      if (!archetypeImages.value[arch.nombre]) {
                        const fallback = await getScryfallImage(
                          "Fblthp, Lost on the Range",
                        );
                        if (fallback) {
                          archetypeImages.value[arch.nombre] =
                            fallback.art_crop;
                          archetypeImages.value[arch.nombre + "__normal"] =
                            fallback.normal;
                        }
                      }
                      return;
                    }
                    const [mainImgs, keyImgs] = await Promise.all([
                      getScryfallImage(entry.main),
                      getScryfallImage(entry.key),
                    ]);
                    if (mainImgs) {
                      archetypeImages.value[arch.nombre] = mainImgs.art_crop;
                      archetypeImages.value[arch.nombre + "__normal"] =
                        mainImgs.normal;
                    }
                    if (keyImgs) {
                      archetypeImages.value[arch.nombre + "__key"] =
                        keyImgs.art_crop;
                      archetypeImages.value[arch.nombre + "__key_normal"] =
                        keyImgs.normal;
                    }
                  }),
                );
                if (i + BATCH < stats.length)
                  await new Promise((r) => setTimeout(r, 800));
              }
            },
            { immediate: true },
          );
          function inferBadge(puesto) {
            if (puesto === 1) return "1st";
            if (puesto === 2) return "2nd";
            if (puesto <= 4) return "T4";
            if (puesto <= 8) return "T8";
            return null;
          }

          function badgeClass(badge) {
            const map = {
              "1st": "badge-gold",
              "2nd": "badge-silver",
              T4: "badge-bronze",
              T8: "badge-green",
            };
            return map[badge] || "";
          }

          function wrColor(wr) {
            if (!wr) return "";
            const pct = parseFloat(wr);
            if (pct >= 52) return "wr--green";
            if (pct >= 41) return "wr--yellow";
            return "wr--red";
          }
          return {
            archetypeStats,
            badgeClass,
            stripPrefix,
            archetypeImages,
            tournamentMeta,
            bestBadge,
            ARCHETYPE_CARD_MAP,
            wrColor,
            displayName,
          };
        },

        template: `
    <div class="row row-cols-2 row-cols-md-4 g-2">
      <div class="col" v-for="arch in archetypeStats" :key="arch.nombre">
        <div class="card h-100">

          <!-- Imagen de cabecera -->
         <img
            v-if="archetypeImages[arch.nombre]"
            :src="archetypeImages[arch.nombre]"
            class="card-img-top"
          />
          <div
            v-else
            class="card-img-top bg-secondary d-flex align-items-center justify-content-center"
            style="height: 160px;"
          >
            <span class="text-white text-muted small">Sin imagen</span>
          </div>

        
          
                <!-- Cuerpo -->
              <div class="card-body p-2">

                    <!-- Badges + Título en la misma línea -->
              <div class="d-flex align-items-start gap-1 mb-2">
                <div class="d-flex flex-wrap gap-1 flex-shrink-0">
                  <span
                    v-for="(badge, i) in arch.badges"
                    :key="i"
                    class="badge"
                    :class="badgeClass(badge)"
                  >{{ badge }}</span>
                </div>
                <h6 class="card-title mb-0" style="font-size: 0.8rem; line-height: 1.2;">
                  <a v-if="arch.decklistUrl" :href="arch.decklistUrl" target="_blank" rel="noopener noreferrer">
                    {{ displayName(arch.nombre) }}
                  </a>
                  <span v-else>{{ displayName(arch.nombre) }}</span>
                </h6>
              </div>

                <!-- Meta % y Winrate destacados -->
                <div class="d-flex justify-content-between mb-2">
                  <div class="text-center flex-fill">
                    <div class="meta-stat-label">META</div>
                    <div class="meta-stat-value">{{ arch.metaPct }} ({{ arch.copies }})</div>
                  </div>
                <div class="vr"></div>
                  <div class="text-center flex-fill">
                    <div class="meta-stat-label">WIN</div>
                    <div class="meta-stat-value" :class="wrColor(arch.winRate)">{{ arch.winRate }}</div>
                  </div>
                </div>

                <!-- V / D / E con colores -->
                <div class="d-flex justify-content-center gap-2">
                  <span class="vde-pill vde-pill--win">{{ arch.wins }}V</span>
                  <span class="vde-pill vde-pill--loss">{{ arch.losses }}D</span>
                  <span class="vde-pill vde-pill--draw">{{ arch.draws }}E</span>
                </div>

              </div>
      </div>
    </div>

  </div>

<br>

    <!-- Tabla resumen -->
<div class="table-responsive mt-4">
  <table class="table table-sm table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th>Lugar</th>
        <th>Arquetipo</th>
        <th class="text-center">Copias</th>
        <th class="text-center">Winrate</th>
        <th>Cartas Clave</th>
      </tr>
    </thead>
    <tbody>
      <tr v-for="arch in archetypeStats" :key="arch.nombre">
        <td>
          <span v-if="bestBadge(arch.badges)" :class="['badge', badgeClass(bestBadge(arch.badges))]">
            {{ bestBadge(arch.badges) }}
          </span>
          <span v-else class="text-muted">—</span>
        </td>
        <td>
          <a v-if="arch.decklistUrl" :href="arch.decklistUrl" target="_blank" class="fw-semibold text-decoration-none">
            {{ displayName(arch.nombre) }}
          </a>
          <span v-else class="fw-semibold">{{ displayName(arch.nombre) }}</span>
        </td>
        <td class="text-center">{{ arch.copies }}</td>
        <td class="text-center">{{ arch.winRate }}</td>
        <td>
   <div class="d-flex gap-2 align-items-center">
  <img
    v-if="archetypeImages[arch.nombre + '__normal']"
    :src="archetypeImages[arch.nombre + '__normal']"
    :title="ARCHETYPE_CARD_MAP[arch.nombre]?.main"
    class="rounded"
    style="width: 215px; height: 40px; object-fit: cover; object-position: top;"
  />
  <img
    v-if="archetypeImages[arch.nombre + '__key_normal']"
    :src="archetypeImages[arch.nombre + '__key_normal']"
    :title="ARCHETYPE_CARD_MAP[arch.nombre]?.key"
    class="rounded"
    style="width: 215px; height: 40px; object-fit: cover; object-position: top;"
  />
</div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
  `,
      };

      // ── Vista Social ────────────────────────────────────────────────────
      const Social = {
        setup() {
          const filteredPlayers = Vue.inject("filteredPlayers", Vue.ref([]));

          const tournamentWinner = Vue.computed(() => {
            const players = filteredPlayers.value;
            if (!players.length) return null;
            // Get the player in position 1
            return players.find((p) => p.Puesto === 1) || players[0];
          });
          const topPhotos = Vue.computed(() => {
            return filteredPlayers.value
              .filter((p) => p["Social - Top8"] && p["Social - Top8"].trim())
              .map((p) =>
                p["Social - Top8"]
                  .trim()
                  .replace(/^\.[\\/]/, "")
                  .replace(/\\/g, "/"),
              );
          });
          return { tournamentWinner, topPhotos };
        },
        template: `
<div>
  <div v-if="tournamentWinner" class="social-container">
    <h3 class="mb-4">Ganador del Torneo</h3>
    
    <div class="winner-card">
      <div class="winner-card-left">
        <div class="winner-photo-placeholder">
          <i class="bi bi-trophy-fill"></i>
        </div>
      </div>
      <div class="winner-card-right">
        <h2 class="winner-name">{{ tournamentWinner.Nombre }}</h2>
        <div class="winner-info">
          <div class="info-row">
            <span class="info-label">Mazo Jugado:</span>
            <span class="info-value">{{ tournamentWinner.Arquetipo }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Logros:</span>
            <div class="achievements">
              <span class="achievement-badge">🏆 1st Place</span>
              <span class="achievement-badge">{{ tournamentWinner.Puntos }} Puntos</span>
              <span class="achievement-badge">{{ tournamentWinner.V }}-{{ tournamentWinner.D }}-{{ tournamentWinner.E }}</span>
              
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Carrusel Top 8 -->
    <div v-if="topPhotos.length" class="mt-5">
      <h5 class="mb-3 fw-bold">📸 Top 8</h5>
      <div id="topCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button
            v-for="(_, i) in topPhotos"
            :key="i"
            type="button"
            data-bs-target="#topCarousel"
            :data-bs-slide-to="i"
            :class="{ active: i === 0 }"
          ></button>
        </div>
        <div class="carousel-inner rounded shadow">
          <div
            v-for="(photo, i) in topPhotos"
            :key="i"
            class="carousel-item"
            :class="{ active: i === 0 }"
          >
            <img
              :src="photo"
              class="d-block w-100"
              style="max-height: 480px; object-fit: contain; background: #000;"
              :alt="'Top 8 foto ' + (i + 1)"
            />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#topCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#topCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>

  </div>
  <div v-else class="text-center mt-5">
    <p class="text-muted">No hay datos disponibles</p>
  </div>
</div>
`,
      };
      // ── Vista Home ──────────────────────────────────────────────────────
      const Home = {
        setup() {
          onMounted(loadData);

          const storeGroups = Vue.computed(() => {
            if (!store.loaded) return [];

            const storeMeta = {
              "todo-freak": {
                label: "Todo Freak",
                social: "https://www.instagram.com/todofreakstore/",
              },
              "blood-moon": {
                label: "Blood Moon",
                social: "https://www.instagram.com/tiendabloodmoon/",
              },
              "casa-de-juegos": {
                label: "Casa de Juegos",
                social: "https://www.instagram.com/casadejuegoscl/",
              },
              "posada-del-dado": {
                label: "Posada del Dado",
                social: "https://www.instagram.com/laposadadeldado/",
              },
              "command-center": {
                label: "Command Center",
                social: "https://www.instagram.com/tienda_command_center/",
              },
              onplay: {
                label: "OnPlay",
                social: "https://www.instagram.com/onplay.games/",
              },
              "voodoo-store": {
                label: "Voodoo Store",
                social: "",
              },
              "moss-juegos": {
                label: "Moss Juegos",
                social: "https://www.instagram.com/mossjuegos/",
              },
              zendicard: {
                label: "Zendicard",
                social: "",
              },
            };

            const map = {};
            store.allPlayers.forEach((p) => {
              const id = normalizeStoreId(p.STORE);
              if (!map[id]) {
                const meta = storeMeta[id] || { label: p.STORE, social: "" };
                map[id] = {
                  id,
                  label: meta.label,
                  social: meta.social,
                  dates: {}, // ← objeto plano, clave = fecha
                };
              }
              const dateKey = `${p.Fecha}|${p.ID || ""}`;
              if (p.Fecha && !map[id].dates[dateKey]) {
                map[id].dates[dateKey] = {
                  fecha: p.Fecha,
                  store: p.STORE,
                  formato: p.FORMATO,
                  idLabel: p.ID || "",
                };
              }
            });

            return Object.values(map).map((s) => ({
              ...s,
              dates: Object.entries(s.dates)
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([, meta]) => ({ ...meta })),
            }));
          });
          const EVENT_STARS = {
            RCQ: "★★",
            Regional: "★★★★",
            "Store Championship": "★",
            Nacional: "★★★",
            Destination: "★★★",
          };

          function eventStars(idLabel) {
            return EVENT_STARS[idLabel] || "";
          }
          return { storeGroups, formatDateFriendly, eventStars };
        },
        template: `
  <div class="home-container">
    <div class="home-card">
      <h1 class="home-title">Reportes RCQ - MODERN</h1>

      <div v-if="storeGroups.length" class="stores-list">
        <div v-for="s in storeGroups" :key="s.id" class="store-group">
          <template v-if="s.social">
            <a :href="s.social" target="_blank" rel="noopener noreferrer" class="store-button store-button--header">
              <i class="bi bi-instagram"></i>
              <span>{{ s.label }}</span>
            </a>
          </template>
          <template v-else>
            <div class="store-button store-button--header">
              <i class="bi bi-shop"></i>
              <span>{{ s.label }}</span>
            </div>
          </template>
            <ul class="store-dates">
          <li v-for="d in s.dates" :key="d.fecha + d.idLabel">
            <router-link :to="{ path: '/tienda/' + s.id + '/standing', query: { fecha: d.fecha, eid: d.idLabel } }">
              {{ formatDateFriendly(d.fecha) }}
            </router-link>
            <span class="store-date__meta">
              — {{ d.store }} · {{ d.formato }}<template v-if="d.idLabel"> · {{ d.idLabel }}</template>
            </span>
            <span v-if="eventStars(d.idLabel)" class="ms-1 text-warning">{{ eventStars(d.idLabel) }}</span>
        </li>
          </ul>
        </div>
      </div>

      <div v-else class="text-muted text-center">Cargando...</div>
    <div class="text-center mt-3">
        <router-link to="/metagame-ranking" class="btn btn-outline-secondary w-100" style="border-radius: 50px; border: 2px solid #000;">
          🏅 Ranking de Metagame
        </router-link>
        <router-link to="/jugadores-ranking" class="btn btn-outline-secondary w-100 mt-2" style="border-radius: 50px; border: 2px solid #000;">
  👤 Ranking de Jugadores
        </router-link>
      </div>
      
    </div>
   
  </div>

`,
      };

      // ── Layout de Torneo ────────────────────────────────────────────────
      const TournamentLayout = {
        setup() {
          onMounted(loadData);
          const route = VueRouter.useRoute();
          const selectedDate = ref(null);
          const selectedEventId = ref(null);

          const storePlayers = computed(() => {
            if (!store.loaded) return [];
            const storeId = route.params.id;
            return store.allPlayers.filter(
              (p) => normalizeStoreId(p.STORE) === storeId,
            );
          });

          const availableEvents = computed(() => {
            const seen = new Set();
            const events = [];
            storePlayers.value.forEach((p) => {
              if (!p.Fecha) return;
              const key = `${p.Fecha}|${p.ID || ""}`;
              if (!seen.has(key)) {
                seen.add(key);
                events.push({ fecha: p.Fecha, eid: p.ID || "" });
              }
            });
            return events.sort((a, b) => a.fecha.localeCompare(b.fecha));
          });

          const initialized = ref(false);
          Vue.watch(
            availableEvents,
            (events) => {
              if (!events.length) return;
              if (initialized.value) return; // ← ya inicializado, no sobreescribir
              const qFecha = route.query.fecha;
              const qEid = route.query.eid ?? "";
              const match = events.find(
                (e) => e.fecha === qFecha && e.eid === qEid,
              );
              if (match) {
                selectedDate.value = match.fecha;
