<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>RCQ 2 Mayo 2026 — Standing</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <style></style>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="app">
      <!-- Router view principal -->
      <router-view></router-view>
    </div>

    <footer>Mario Canto. 2026. PandaComboMtg</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const { createApp, ref, computed, onMounted } = Vue;

      // ── Store compartido (simple reactive state) ────────────────────────
      const store = Vue.reactive({
        allPlayers: [],
        loaded: false,
      });

      async function loadData() {
        if (store.loaded) return;
        const res = await fetch("./Data/MAIN_RCQ_SC_JSON.json");
        store.allPlayers = await res.json();
        store.loaded = true;
      }

      // Función para normalizar nombres de tienda (ej: 'Casa de Juegos' -> 'casa-de-juegos')
      function normalizeStoreId(storeName) {
        if (!storeName) return "";
        return storeName.toLowerCase().replace(/[\s_]+/g, "-");
      }

      // Función para formatear la fecha de ISO a amigable
      function formatDateFriendly(dateString) {
        if (!dateString) return "";
        const options = { year: "numeric", month: "long", day: "numeric" };
        const date = new Date(dateString);
        return date.toLocaleDateString("es-ES", {
          ...options,
          timeZone: "UTC",
        });
      }

      // ── Vista Standing ──────────────────────────────────────────────────
      const Standing = {
        template: `
    <div>
      <table class="table table-sm table-bordered table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Pts</th>
            <th>%VPO</th>
            <th>%JG</th>
            <th>%JGO</th>
            <th>V</th>
            <th>D</th>
            <th>E</th>
            <th>Arquetipo</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="player in filteredPlayers" :key="player.Puesto + player.Nombre">
            <td>{{ player.Puesto }}</td>
            <td>{{ player.Nombre }}</td>
            <td>{{ player.Puntos }}</td>
            <td>{{ player['%VPO'] }}</td>
            <td>{{ player['%JG'] }}</td>
            <td>{{ player['%JGO'] }}</td>
            <td>{{ player.V }}</td>
            <td>{{ player.D }}</td>
            <td>{{ player.E }}</td>
            <td>
            <a v-if="player['URL Decklist']" :href="player['URL Decklist']" target="_blank" rel="noopener noreferrer">
            {{ stripPrefix(player.Arquetipo) }}
            </a>
            <span v-else>{{ stripPrefix(player.Arquetipo) }}</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  `,

        setup() {
          const filteredPlayers = Vue.inject("filteredPlayers", ref([]));
          function stripPrefix(name) {
            if (!name || name.length <= 4) return name;
            return name.slice(4);
          }
          return { filteredPlayers, stripPrefix };
        },
      };

      // ── Vista Metagame ──────────────────────────────────────────────────
      const Metagame = {
        setup() {
          const filteredPlayers = Vue.inject("filteredPlayers", Vue.ref([]));

          const archetypeStats = Vue.computed(() => {
            const players = filteredPlayers.value;
            if (!players.length) return [];

            const total = players.length;
            const map = {};

            players.forEach((p) => {
              const key = p.Arquetipo;
              if (!map[key]) {
                map[key] = {
                  nombre: key,
                  imgUrl: p["IMG URL"] || "",
                  decklistUrl: p["URL Decklist"] || "",
                  copies: 0,
                  wins: 0,
                  losses: 0,
                  draws: 0,
                  totalGames: 0,
                  badges: [],
                };
              }

              const entry = map[key];
              entry.copies++;

              const v = parseInt(p.V) || 0;
              const d = parseInt(p.D) || 0;
              const e = parseInt(p.E) || 0;
              entry.wins += v;
              entry.losses += d;
              entry.draws += e;
              entry.totalGames += v + d + e;

              // Badge: usa campo Badge del JSON si existe, si no, inferir por Puesto
              const badge = p.Badge || inferBadge(p.Puesto);
              if (badge) entry.badges.push(badge);
            });

            return Object.values(map)
              .map((entry) => ({
                ...entry,
                metaPct: ((entry.copies / total) * 100).toFixed(2) + "%",
                winRate:
                  entry.totalGames > 0
                    ? ((entry.wins / entry.totalGames) * 100).toFixed(1) + "%"
                    : "N/A",
              }))
              .sort((a, b) => b.copies - a.copies);
          });

          function inferBadge(puesto) {
            if (puesto === 1) return "1st";
            if (puesto === 2) return "2nd";
            if (puesto <= 4) return "Top4";
            if (puesto <= 8) return "Top8";
            return null;
          }

          function badgeClass(badge) {
            const map = {
              "1st": "badge-gold",
              "2nd": "badge-silver",
              Top4: "badge-bronze",
              Top8: "badge-green",
            };
            return map[badge] || "";
          }
          function stripPrefix(name) {
            if (!name || name.length <= 4) return name;
            return name.slice(4);
          }
          return { archetypeStats, badgeClass, stripPrefix };
        },

        template: `
    <div class="row row-cols-1 row-cols-md-3 g-3">
      <div class="col" v-for="arch in archetypeStats" :key="arch.nombre">
        <div class="card h-100">

          <!-- Imagen de cabecera -->
          <img
            v-if="arch.imgUrl"
            :src="arch.imgUrl"
            class="card-img-top"
            style="height: 160px; object-fit: cover;"
            :alt="arch.nombre"
          />
          <div
            v-else
            class="card-img-top bg-secondary d-flex align-items-center justify-content-center"
            style="height: 160px;"
          >
            <span class="text-white text-muted small">Sin imagen</span>
          </div>

          <!-- Cuerpo -->
          <div class="card-body">

            <!-- Badges + Título -->
            <div class="d-flex flex-wrap align-items-center gap-1 mb-1">
              <span
                v-for="(badge, i) in arch.badges"
                :key="i"
                class="badge"
                :class="badgeClass(badge)"
              >{{ badge }}</span>
            </div>
            <h6 class="card-title mb-3">
              <a v-if="arch.decklistUrl" :href="arch.decklistUrl" target="_blank" rel="noopener noreferrer">
                {{ stripPrefix(arch.nombre) }}
              </a>
              <span v-else>{{ stripPrefix(arch.nombre) }}</span>
            </h6>

            <!-- Estadísticas -->
            <p class="card-text mb-1">
              <small class="text-muted">Copias jugadas</small>
              <strong class="float-end">{{ arch.copies }}</strong>
            </p>
            <p class="card-text mb-1">
              <small class="text-muted">META %</small>
              <strong class="float-end">{{ arch.metaPct }}</strong>
            </p>
            <p class="card-text mb-1">
              <small class="text-muted">WIN RATE</small>
              <strong class="float-end">{{ arch.winRate }}</strong>
            </p>
            <p class="card-text mb-0">
              <small class="text-muted">Partidas (V / D / E)</small>
              <strong class="float-end">{{ arch.wins }} / {{ arch.losses }} / {{ arch.draws }}</strong>
            </p>

          </div>
        </div>
      </div>
    </div>
  `,
      };

      // ── Vista Social ────────────────────────────────────────────────────
      const Social = {
        setup() {
          const filteredPlayers = Vue.inject("filteredPlayers", Vue.ref([]));

          const tournamentWinner = Vue.computed(() => {
            const players = filteredPlayers.value;
            if (!players.length) return null;
            // Get the player in position 1
            return players.find((p) => p.Puesto === 1) || players[0];
          });

          return { tournamentWinner };
        },
        template: `
    <div v-if="tournamentWinner" class="social-container">
      <h3 class="mb-4">Ganador del Torneo</h3>
      
      <div class="winner-card">
        <div class="winner-card-left">
          <div class="winner-photo-placeholder">
            <i class="bi bi-trophy-fill"></i>
          </div>
        </div>
        
        <div class="winner-card-right">
          <h2 class="winner-name">{{ tournamentWinner.Nombre }}</h2>
          
          <div class="winner-info">
            <div class="info-row">
              <span class="info-label">Mazo Jugado:</span>
              <span class="info-value">{{ tournamentWinner.Arquetipo }}</span>
            </div>
            
            <div class="info-row">
              <span class="info-label">Logros:</span>
              <div class="achievements">
                <span class="achievement-badge">🏆 1st Place</span>
                <span class="achievement-badge">{{ tournamentWinner.Puntos }} Puntos</span>
                <span class="achievement-badge">{{ tournamentWinner.V }}-{{ tournamentWinner.D }}-{{ tournamentWinner.E }}</span>
                <span class="achievement-badge">{{ tournamentWinner['%VPO'] }}% Win Rate</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div v-else class="text-center mt-5">
      <p class="text-muted">No hay datos disponibles</p>
    </div>
  `,
      };
      // ── Vista Home ──────────────────────────────────────────────────────
      const Home = {
        setup() {
          onMounted(loadData);

          const storeGroups = Vue.computed(() => {
            if (!store.loaded) return [];

            const storeMeta = {
              "todo-freak": {
                label: "Todo Freak",
                social: "https://www.instagram.com/todofreakstore/",
              },
              "blood-moon": {
                label: "Blood Moon",
                social: "https://www.instagram.com/tiendabloodmoon/",
              },
              "casa-de-juegos": {
                label: "Casa de Juegos",
                social: "https://www.instagram.com/casadejuegoscl/",
              },
            };

            const map = {};
            store.allPlayers.forEach((p) => {
              const id = normalizeStoreId(p.STORE);
              if (!map[id]) {
                const meta = storeMeta[id] || { label: p.STORE, social: "" };
                map[id] = {
                  id,
                  label: meta.label,
                  social: meta.social,
                  dates: new Set(),
                };
              }
              if (p.Fecha) map[id].dates.add(p.Fecha);
            });

            return Object.values(map).map((s) => ({
              ...s,
              dates: [...s.dates].sort(),
            }));
          });

          return { storeGroups, formatDateFriendly };
        },
        template: `
    <div class="home-container">
      <div class="home-card">
        <h1 class="home-title">Reportes RCQ - MODERN</h1>
        <div v-if="!storeGroups.length" class="text-muted text-center">Cargando...</div>
        <div class="stores-list">
          <div   v-if="store.social"
            :href="store.social"
            target="_blank"
            rel="noopener noreferrer"
            class="store-button store-button--header"
          >
            <i class="bi bi-instagram"></i>
            <span>{{ store.label }}</span>
          </a>
          <div v-else class="store-button store-button--header">
            <i class="bi bi-shop"></i>
            <span>{{ store.label }}</span>
          </div>
            <ul class="store-dates">
              <li v-for="date in store.dates" :key="date">
                <router-link :to="{ path: '/tienda/' + store.id + '/standing', query: { fecha: date } }">
                  {{ formatDateFriendly(date) }}
                </router-link>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  `,
      };

      // ── Layout de Torneo ────────────────────────────────────────────────
      const TournamentLayout = {
        setup() {
          onMounted(loadData);
          const route = VueRouter.useRoute();
          const selectedDate = ref(null);

          const storePlayers = computed(() => {
            if (!store.loaded) return [];
            const storeId = route.params.id;
            return store.allPlayers.filter(
              (p) => normalizeStoreId(p.STORE) === storeId,
            );
          });

          const availableDates = computed(() => {
            const dates = storePlayers.value
              .map((p) => p.Fecha)
              .filter(Boolean);
            const uniqueDates = [...new Set(dates)].sort();
            return uniqueDates;
          });

          Vue.watch(
            availableDates,
            (newDates) => {
              if (!newDates.length) return;
              const queryFecha = route.query.fecha;
              if (queryFecha && newDates.includes(queryFecha)) {
                selectedDate.value = queryFecha;
              } else if (!newDates.includes(selectedDate.value)) {
                selectedDate.value = newDates[newDates.length - 1];
              }
            },
            { immediate: true },
          );

          const filteredPlayers = computed(() => {
            if (!selectedDate.value) return [];
            return storePlayers.value.filter(
              (p) => p.Fecha === selectedDate.value,
            );
          });

          // Proveemos los jugadores filtrados a los componentes hijos
          Vue.provide("filteredPlayers", filteredPlayers);

          return { selectedDate, availableDates, formatDateFriendly };
        },
        computed: {
          logoSrc() {
            const storeLogos = {
              "todo-freak": "./assets/LogoTodoFreak.jpg",
              "blood-moon": "./assets/LogoBloodMoon.jpg",
              "casa-de-juegos": "./assets/LogoCasaDeJuegos.jpg",
            };
            return storeLogos[this.$route.params.id] || "";
          },
        },
        template: `
        <div>
          <div>
            <img v-if="logoSrc" :src="logoSrc" alt="Logo Tienda" class="img-fluid" style="height: 100px; object-fit: contain; margin-left: 1rem;" />
            <div v-else style="height: 100px; display: flex; align-items: center; padding-left: 1rem;">
              <h2>{{ $route.params.id.replace(/-/g, ' ').toUpperCase() }}</h2>
            </div>
          </div>
          <!-- Navbar -->
          <nav class="navbar-custom border-bottom bg-light">
            <div class="container d-flex flex-wrap align-items-center justify-content-between py-2">
              <div class="d-flex align-items-center mb-2 mb-md-0">
                <router-link class="btn btn-outline-secondary btn-sm me-3" to="/">
                  <i class="bi bi-arrow-left"></i> Inicio
                </router-link>
                
                <!-- Selector de Fechas -->
                <div v-if="availableDates.length > 0" class="d-flex align-items-center">
                  <label class="me-2 text-muted small fw-bold">Fecha:</label>
                  <select v-model="selectedDate" class="form-select form-select-sm w-auto" style="min-width: 200px;">
                    <option v-for="date in availableDates" :key="date" :value="date">
                      {{ formatDateFriendly(date) }}
                    </option>
                  </select>
                </div>
              </div>
              <div class="d-flex gap-2">
                <router-link class="btn btn-sm btn-outline-primary" :to="'/tienda/' + $route.params.id + '/standing'">
                  <i class="bi bi-trophy me-1"></i> Standing
                </router-link>
                <router-link class="btn btn-sm btn-outline-primary" :to="'/tienda/' + $route.params.id + '/metagame'">
                  <i class="bi bi-pie-chart me-1"></i> Metagame
                </router-link>
                <router-link class="btn btn-sm btn-outline-primary" :to="'/tienda/' + $route.params.id + '/social'">
                  <i class="bi bi-people me-1"></i> Social
                </router-link>
              </div>
            </div>
          </nav>

          <!-- Router view específico del torneo -->
          <div class="main-container container mt-3">
            <router-view></router-view>
          </div>
        </div>
      `,
      };

      // ── Router ──────────────────────────────────────────────────────────
      const routes = [
        { path: "/", component: Home },
        {
          path: "/tienda/:id",
          component: TournamentLayout,
          children: [
            { path: "", redirect: "standing" },
            { path: "standing", component: Standing },
            { path: "metagame", component: Metagame },
            { path: "social", component: Social },
          ],
        },
      ];

      const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes,
      });

      // ── App ──────────────────────────────────────────────────────────────
      const app = createApp({});
      app.use(router);
      app.mount("#app");
    </script>
  </body>
</html>
